<!DOCTYPE html>
<html lang="vi">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Gemini AI Chat</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
  <style>
    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Inter', sans-serif;
      min-height: 100vh;
      background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1rem;
    }

    .container {
      width: 100%;
      max-width: 720px;
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }

    h1 {
      text-align: center;
      font-size: 1.8rem;
      font-weight: 600;
      background: linear-gradient(90deg, #a78bfa, #60a5fa);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      letter-spacing: -0.5px;
    }

    .api-row {
      display: flex;
      gap: 0.5rem;
    }

    input[type="text"],
    input[type="password"],
    textarea {
      width: 100%;
      padding: 0.75rem 1rem;
      border-radius: 12px;
      border: 1px solid rgba(255, 255, 255, 0.15);
      background: rgba(255, 255, 255, 0.07);
      color: #e2e8f0;
      font-family: inherit;
      font-size: 0.95rem;
      outline: none;
      transition: border-color 0.2s;
    }

    input::placeholder,
    textarea::placeholder {
      color: rgba(255, 255, 255, 0.35);
    }

    input:focus,
    textarea:focus {
      border-color: #a78bfa;
    }

    textarea {
      resize: none;
      height: 90px;
    }

    button {
      padding: 0.75rem 1.4rem;
      border: none;
      border-radius: 12px;
      cursor: pointer;
      font-family: inherit;
      font-size: 0.95rem;
      font-weight: 500;
      transition: opacity 0.2s, transform 0.15s;
    }

    button:active {
      transform: scale(0.97);
    }

    button:disabled {
      opacity: 0.45;
      cursor: not-allowed;
    }

    .btn-primary {
      background: linear-gradient(135deg, #a78bfa, #60a5fa);
      color: #fff;
      white-space: nowrap;
    }

    .btn-primary:hover:not(:disabled) {
      opacity: 0.88;
    }

    /* Chat Box */
    .chat-box {
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 16px;
      padding: 1rem;
      min-height: 300px;
      max-height: 420px;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
      backdrop-filter: blur(10px);
    }

    .chat-box::-webkit-scrollbar {
      width: 5px;
    }

    .chat-box::-webkit-scrollbar-track {
      background: transparent;
    }

    .chat-box::-webkit-scrollbar-thumb {
      background: rgba(255, 255, 255, 0.2);
      border-radius: 99px;
    }

    .msg {
      display: flex;
      flex-direction: column;
      max-width: 85%;
      animation: slideIn 0.25s ease;
    }

    @keyframes slideIn {
      from {
        opacity: 0;
        transform: translateY(6px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .msg.user {
      align-self: flex-end;
      align-items: flex-end;
    }

    .msg.ai {
      align-self: flex-start;
      align-items: flex-start;
    }

    .bubble {
      padding: 0.65rem 1rem;
      border-radius: 14px;
      font-size: 0.92rem;
      line-height: 1.55;
      white-space: pre-wrap;
      word-break: break-word;
    }

    .msg.user .bubble {
      background: linear-gradient(135deg, #a78bfa88, #60a5fa88);
      color: #f1f5f9;
      border-bottom-right-radius: 4px;
    }

    .msg.ai .bubble {
      background: rgba(255, 255, 255, 0.1);
      color: #e2e8f0;
      border-bottom-left-radius: 4px;
    }

    .label {
      font-size: 0.72rem;
      color: rgba(255, 255, 255, 0.4);
      margin-bottom: 2px;
      padding: 0 4px;
    }

    .empty-hint {
      color: rgba(255, 255, 255, 0.25);
      text-align: center;
      font-size: 0.88rem;
      margin: auto;
    }

    .send-row {
      display: flex;
      gap: 0.5rem;
      align-items: flex-end;
    }

    .status {
      font-size: 0.8rem;
      color: rgba(255, 255, 255, 0.4);
      text-align: center;
      min-height: 1.2em;
    }
  </style>
</head>

<body>
  <div class="container">
    <h1>✨ Gemini AI Chat</h1>

    <!-- API Key -->
    <div class="api-row">
      <input type="password" id="apiKey" placeholder="Nhập Gemini API Key của bạn..." />
      <button class="btn-primary" onclick="saveKey()">Lưu</button>
    </div>

    <!-- Chat history -->
    <div class="chat-box" id="chatBox">
      <p class="empty-hint">Hãy nhập API Key rồi bắt đầu trò chuyện 🚀</p>
    </div>

    <p class="status" id="status"></p>

    <!-- Input -->
    <div class="send-row">
      <textarea id="prompt" placeholder="Nhập tin nhắn... (Enter để gửi, Shift+Enter xuống dòng)"></textarea>
      <button class="btn-primary" id="sendBtn" onclick="sendMessage()" disabled>Gửi</button>
    </div>
  </div>

  <script>
    const GEMINI_URL = 'https://generativelanguage.googleapis.com/v1beta/models/gemini-3-pro-preview:generateContent';

    let apiKey = 'gen-lang-client-0613365535';
    const history = []; // {role, text}

    const chatBox = document.getElementById('chatBox');
    const statusEl = document.getElementById('status');
    const sendBtn = document.getElementById('sendBtn');
    const promptEl = document.getElementById('prompt');
    const keyEl = document.getElementById('apiKey');

    function saveKey() {
      const k = keyEl.value.trim();
      if (!k) { setStatus('⚠️ Vui lòng nhập API Key.'); return; }
      apiKey = k;
      sendBtn.disabled = false;
      setStatus('✅ API Key đã lưu. Hãy bắt đầu chat!');
      keyEl.value = '';
    }

    promptEl.addEventListener('keydown', e => {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        if (!sendBtn.disabled) sendMessage();
      }
    });

    function setStatus(msg) {
      statusEl.textContent = msg;
    }

    function appendMsg(role, text) {
      // Remove empty hint
      const hint = chatBox.querySelector('.empty-hint');
      if (hint) hint.remove();

      const isUser = role === 'user';
      const div = document.createElement('div');
      div.className = `msg ${isUser ? 'user' : 'ai'}`;
      div.innerHTML = `
      <span class="label">${isUser ? 'Bạn' : '✦ Gemini'}</span>
      <div class="bubble">${escapeHtml(text)}</div>
    `;
      chatBox.appendChild(div);
      chatBox.scrollTop = chatBox.scrollHeight;
      return div;
    }

    function escapeHtml(str) {
      return str.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
    }

    async function sendMessage() {
      const text = promptEl.value.trim();
      if (!text) return;
      if (!apiKey) { setStatus('⚠️ Chưa có API Key!'); return; }

      promptEl.value = '';
      appendMsg('user', text);
      history.push({ role: 'user', parts: [{ text }] });

      sendBtn.disabled = true;
      setStatus('⏳ Đang trả lời...');

      try {
        const res = await fetch(`${GEMINI_URL}?key=${apiKey}`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ contents: history })
        });

        if (!res.ok) {
          const err = await res.json();
          throw new Error(err.error?.message || `HTTP ${res.status}`);
        }

        const data = await res.json();
        const reply = data.candidates?.[0]?.content?.parts?.[0]?.text || '(Không có phản hồi)';

        history.push({ role: 'model', parts: [{ text: reply }] });
        appendMsg('ai', reply);
        setStatus('');
      } catch (e) {
        setStatus(`❌ Lỗi: ${e.message}`);
      } finally {
        sendBtn.disabled = false;
        promptEl.focus();
      }
    }
  </script>
</body>

</html>
