<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Quản lý Kho Cá - Admin</title>
    <link rel="stylesheet" href="admin.css">
</head>
<body>
    <div class="admin-container">
        <div class="stats-grid">
            <div class="stat-card">
                <p>Tổng loại cá</p>
                <h3 id="totalFish">0</h3>
            </div>
            <div class="stat-card">
                <p>Tổng giá trị kho</p>
                <h3 id="totalValue">0đ</h3>
            </div>
            <div class="stat-card">
                <p>Giá trung bình</p>
                <h3 id="avgPrice">0đ</h3>
            </div>
        </div>

        <div class="main-content">
            <div class="form-section">
                <h4 id="formTitle">➕ Thêm cá mới vào kho</h4>
                <form id="fishForm">
                    <input type="hidden" id="fishId">
                    
                    <div class="input-group">
                        <label>Tên cá</label>
                        <input type="text" id="fishName" placeholder="Cá lóc vây xanh..." required>
                    </div>
                    
                    <div class="input-group">
                        <label>Hình ảnh (URL)</label>
                        <input type="text" id="fishImg" placeholder="https://..." required>
                    </div>

                    <div style="display: flex; gap: 15px;">
                        <div class="input-group" style="flex: 1;">
                            <label>Giá tiền (VNĐ)</label>
                            <input type="number" id="fishPrice" placeholder="Ví dụ: 500000" required>
                        </div>
                        <div class="input-group" style="flex: 1;">
                            <label>Kích thước (cm)</label>
                            <input type="text" id="fishSize" placeholder="7-10cm">
                        </div>
                    </div>

                    <div class="input-group">
                        <label>Tình trạng</label>
                        <input type="text" id="fishStatus" placeholder="Khỏe mạnh, sung...">
                    </div>

                    <div class="btn-group" style="margin-top: 20px;">
                        <button type="submit" id="btnAdd">➕ XÁC NHẬN THÊM</button>
                        <button type="button" id="btnUpdate" style="display: none; background: #f59e0b;">💾 LƯU CẬP NHẬT</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <script src="ad.js"></script>
</body>
</html>
