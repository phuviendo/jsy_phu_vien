<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - Quản Lý Vựa Cá</title>
    <link rel="stylesheet" href="admin.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
</head>
<body>
    
    <div class="admin-container">
        <aside class="sidebar">
            <div class="logo">🐟 OCEAN ADMIN</div>
            <nav>
                <a href="#" class="active">📊 Thống kê chung</a>
            </nav>
        </aside>

        <main class="main-content">
            <header class="top-header">
                <h2>Bảng Điều Khiển Quản Trị</h2>
                <div class="admin-profile">Admin Vựa Cá 👋</div>
            </header>

            <div class="stats-row">
                <div class="stat-card">
                    <div class="icon blue">🐠</div>
                    <div>
                        <h3 id="totalFish">0</h3>
                        <p>Tổng loại cá</p>
                    </div>
                </div>
                <div class="stat-card">
                    <div class="icon gold">💰</div>
                    <div>
                        <h3 id="totalValue">0đ</h3>
                        <p>Tổng giá trị kho</p>
                    </div>
                </div>
            </div>

            <section class="content-card">
                <div class="card-title">Cập nhật thông tin cá</div>
                <form id="fishForm" class="grid-form">
                    <input type="hidden" id="fishId">
                    <div class="input-box">
                        <label>Tên cá</label>
                        <input type="text" id="fishName" required placeholder="Cá lóc vây xanh...">
                    </div>
                    <div class="input-box">
                        <label>Hình ảnh (URL)</label>
                        <input type="text" id="fishImg" required placeholder="https://unsplash.com/...">
                    </div>
                    <div class="input-box">
                        <label>Giá tiền (VND)</label>
                        <input type="number" id="fishprice" required>
                    </div>
                    <div class="input-box">
                        <label>Tình trạng</label>
                        <input type="text" id="fishStatus" required placeholder="Khỏe mạnh, sung...">
                    </div>
                    <div class="input-box">
                        <label>Kích thước (cm)</label>
                        <input type="number" id="fishSize" required>
                    </div>
                    <div class="input-box">
                        <label>Thức ăn</label>
                        <input type="text" id="fishEat" required>
                    </div>
                    <div class="input-box">
                        <label>Ngày nuôi</label>
                        <input type="date" id="fishDay" required>
                    </div>
                    <div class="form-buttons">
                        <button type="submit" id="btnAdd" class="btn-primary">➕ Thêm Mới</button>
                        <button type="button" id="btnUpdate" class="btn-warning" style="display:none;">💾 Lưu Cập Nhật</button>
                    </div>
                </form>
            </section>

            <section class="content-card">
                <div class="card-header-flex">
                    <div class="card-title">Danh sách kho cá</div>
                    <select id="priceFilter" onchange="filterByPrice()" class="styled-select">
                        <option value="all">Tất cả mức giá</option>
                        <option value="100000">Dưới 100k</option>
                        <option value="500000">100k - 500k</option>
                        <option value="vip">Hàng VIP (>1 triệu)</option>
                    </select>
                </div>
                <div class="table-wrapper">
                    <table>
                        <thead>
                            <tr>
                                <th>Ảnh</th>
                                <th>Tên cá</th>
                                <th>Giá</th>
                                <th>Size</th>
                                <th>Tình trạng</th>
                                <th>Hành động</th>
                            </tr>
                        </thead>
                        <tbody id="tableBody"></tbody>
                    </table>
                </div>
            </section>
        </main>
    </div>
    <script src="ad.js"></script>
</body>
</html>
